<!-- Schema JSON-LD: FAQ (para la sección de preguntas frecuentes) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "¿Qué hace diferente a Apps del Sur de un SaaS genérico?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Apps del Sur no es un software genérico donde el usuario se adapta al sistema. Cada implementación se desarrolla a medida de la operación del cliente: sus cuarteles, variedades, labores y estructura de costos reales. Esto es posible gracias al desarrollo asistido por IA, que permite ofrecer software personalizado a precios accesibles para pymes agrícolas."
      }
    },
    {
      "@type": "Question",
      "name": "¿Funciona sin conexión a internet en el campo?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí. La aplicación móvil de Apps del Sur (cuaderno de campo digital) está diseñada para funcionar offline. Los datos se registran sin conexión y se sincronizan automáticamente cuando hay señal de internet disponible."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cuánto tiempo toma implementar el sistema en mi operación?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El proyecto de implementación toma entre 8 y 12 semanas, incluyendo el desarrollo a medida de la plataforma, configuración de cuarteles y labores, capacitación presencial del equipo de campo y período de acompañamiento."
      }
    },
    {
      "@type": "Question",
      "name": "¿Es compatible con los requisitos de certificación sustentable?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí. Apps del Sur genera registros digitales trazables que cumplen con los estándares de Sustentavid, GlobalG.A.P. y la normativa laboral chilena, facilitando auditorías y procesos de certificación."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cuánto cuesta y qué modalidades ofrecen?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ofrecemos dos modalidades: (1) Compra de licencia con implementación completa por $8-12M CLP, que incluye plataforma web, app móvil, capacitación presencial y 12 meses de soporte. (2) Suscripción mensual de $450K CLP/mes con setup inicial de $2.5M CLP. Ambas modalidades son financiables con fondos públicos CORFO, FIA y SERCOTEC (50-98% del proyecto)."
      }
    },
    {
      "@type": "Question",
      "name": "¿Existen fondos públicos para financiar la implementación?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí. Instrumentos como CORFO Crea y Valida, FIA Innovación Agrícola y SERCOTEC CRECE pueden financiar entre el 50% y el 98% del proyecto, dependiendo del tamaño de la empresa. Apps del Sur acompaña al cliente en todo el proceso de postulación al fondo público."
      }
    }
  ]
}
</script>
