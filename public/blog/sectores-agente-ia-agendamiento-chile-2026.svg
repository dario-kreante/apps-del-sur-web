      <circle cx="48" cy="52" r="30" fill="#D1FAE5"/>
      <text x="48" y="64" text-anchor="middle" fill="#047857" font-size="30">+</text>
      <text x="94" y="52" fill="#064E3B" font-size="25" font-weight="850">Salud</text>
      <text x="94" y="86" fill="#475467" font-size="18">clínicas dentales,</text>
      <text x="94" y="114" fill="#475467" font-size="18">médicos, kinesiología</text>
    </g>
    <g transform="translate(316 0)">
      <rect x="0" y="0" width="284" height="156" rx="22" fill="#fff" stroke="#D0D5DD" filter="url(#shadow)"/>
      <circle cx="48" cy="52" r="30" fill="#D1FAE5"/>
      <text x="48" y="64" text-anchor="middle" fill="#047857" font-size="30">✂</text>
      <text x="94" y="52" fill="#064E3B" font-size="25" font-weight="850">Belleza</text>
      <text x="94" y="86" fill="#475467" font-size="18">peluquerías, barberías,</text>
      <text x="94" y="114" fill="#475467" font-size="18">spa y centros estéticos</text>
    </g>
    <g transform="translate(632 0)">
      <rect x="0" y="0" width="284" height="156" rx="22" fill="#fff" stroke="#D0D5DD" filter="url(#shadow)"/>
      <circle cx="48" cy="52" r="30" fill="#D1FAE5"/>
      <text x="48" y="64" text-anchor="middle" fill="#047857" font-size="30">⚙</text>
      <text x="94" y="52" fill="#064E3B" font-size="25" font-weight="850">Talleres</text>
      <text x="94" y="86" fill="#475467" font-size="18">mecánicos, mantención,</text>
      <text x="94" y="114" fill="#475467" font-size="18">servicio técnico</text>
    </g>
    <g transform="translate(948 0)">
      <rect x="0" y="0" width="284" height="156" rx="22" fill="#fff" stroke="#D0D5DD" filter="url(#shadow)"/>
      <circle cx="48" cy="52" r="30" fill="#D1FAE5"/>
      <text x="48" y="64" text-anchor="middle" fill="#047857" font-size="30">⌂</text>
      <text x="94" y="52" fill="#064E3B" font-size="25" font-weight="850">Servicios</text>
      <text x="94" y="86" fill="#475467" font-size="18">visitas a domicilio,</text>
      <text x="94" y="114" fill="#475467" font-size="18">instalaciones, soporte</text>
    </g>
    <g transform="translate(158 210)">
      <rect x="0" y="0" width="284" height="156" rx="22" fill="#fff" stroke="#D0D5DD" filter="url(#shadow)"/>
      <circle cx="48" cy="52" r="30" fill="#D1FAE5"/>
      <text x="48" y="64" text-anchor="middle" fill="#047857" font-size="30">★</text>
      <text x="94" y="52" fill="#064E3B" font-size="25" font-weight="850">Turismo</text>
      <text x="94" y="86" fill="#475467" font-size="18">tours, reservas,</text>
      <text x="94" y="114" fill="#475467" font-size="18">experiencias locales</text>
    </g>
    <g transform="translate(474 210)">
      <rect x="0" y="0" width="284" height="156" rx="22" fill="#fff" stroke="#D0D5DD" filter="url(#shadow)"/>
      <circle cx="48" cy="52" r="30" fill="#D1FAE5"/>
      <text x="48" y="64" text-anchor="middle" fill="#047857" font-size="30">✓</text>
      <text x="94" y="52" fill="#064E3B" font-size="25" font-weight="850">Educación</text>
      <text x="94" y="86" fill="#475467" font-size="18">clases, asesorías,</text>
      <text x="94" y="114" fill="#475467" font-size="18">entrevistas y admisión</text>
    </g>
    <g transform="translate(790 210)">
      <rect x="0" y="0" width="284" height="156" rx="22" fill="#fff" stroke="#D0D5DD" filter="url(#shadow)"/>
      <circle cx="48" cy="52" r="30" fill="#D1FAE5"/>
      <text x="48" y="64" text-anchor="middle" fill="#047857" font-size="30">◇</text>
      <text x="94" y="52" fill="#064E3B" font-size="25" font-weight="850">Funerarias</text>
      <text x="94" y="86" fill="#475467" font-size="18">atención 24/7, visitas,</text>
