  <rect x="84" y="782" width="1232" height="58" rx="29" fill="url(#g)"/>
  <text x="700" y="820" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850">Mejor fit: negocios con alta intención, agenda limitada y clientes que escriben fuera de horario.</text>
