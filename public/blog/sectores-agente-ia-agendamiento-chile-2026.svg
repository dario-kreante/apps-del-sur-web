<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Sectores para agentes IA de agendamiento en Chile</title>
  <desc id="desc">Mapa sectorial y local de negocios chilenos que pueden usar agentes de IA de agendamiento: salud, belleza, talleres, servicios técnicos, turismo, educación y funerarias.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#064E3B"/>
      <stop offset=".6" stop-color="#059669"/>
      <stop offset="1" stop-color="#7ED957"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="126%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#03241F" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1400" height="900" fill="#fff"/>
  <rect x="0" y="0" width="1400" height="208" fill="#ECFDF5"/>
  <path d="M0 156c170 32 306-42 458-14 164 30 250 72 422 22 198-58 304-42 520 16V0H0Z" fill="#D1FAE5" opacity=".78"/>
  <text x="72" y="82" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850">Apps del Sur</text>
  <text x="72" y="144" fill="#0F2D2A" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="850">Sectores donde más rinde agendar con IA</text>
  <text x="72" y="184" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">GEO local: Santiago, Rancagua, Talca, Curicó, Chillán, Concepción y sur de Chile</text>

  <g transform="translate(86 270)" font-family="Inter, Arial, sans-serif">
    <g>
