<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Paso a paso para crear un agente IA de agendamiento</title>
  <desc id="desc">Ruta de implementación de ocho pasos para crear un agente de IA de agendamiento por WhatsApp para empresas chilenas.</desc>
  <defs>
